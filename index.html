<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capstone Grading System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --accent-glow: rgba(79,142,247,0.18);
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --text: #e8ecf5;
      --text-muted: #6b7494;
      --text-soft: #9ba5c4;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, rgba(79,142,247,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(124,92,252,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      padding: 22px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-mark {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(79,142,247,0.35);
    }

    .header-title h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ─── MOBILE TOGGLE ─── */
    .sidebar-toggle {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 12px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      gap: 6px;
      align-items: center;
    }

    /* ─── MAIN LAYOUT ─── */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 24px auto 40px;
      padding: 0 20px;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #303550; }

    .card-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::before {
      content: '';
      width: 16px; height: 2px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      border-radius: 2px;
    }

    /* ─── SELECT ─── */
    .select-wrapper { position: relative; }

    select {
      width: 100%;
      appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 36px 10px 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* ─── INPUTS ─── */
    .form-group { margin-bottom: 11px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-soft);
      letter-spacing: 0.4px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--text-muted); }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 9px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,142,247,0.25);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-danger {
      background: rgba(248,113,113,0.1);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.2);
      padding: 5px 10px;
      font-size: 12px;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.18); }

    .btn-warning {
      background: rgba(251,191,36,0.1);
      color: var(--warning);
      border: 1px solid rgba(251,191,36,0.2);
      padding: 5px 10px;
      font-size: 12px;
    }
    .btn-warning:hover { background: rgba(251,191,36,0.18); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-row .btn-primary { flex: 1; width: auto; }

    /* ─── MAIN CONTENT ─── */
    .main { display: flex; flex-direction: column; gap: 14px; }

    /* ─── STUDENT INFO BAR ─── */
    .student-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .student-info {
      display: flex; align-items: center; gap: 12px;
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .student-details h3 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .student-details p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .gwa-display {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .gwa-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .gwa-value {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gwa-remark {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 99px;
      margin-top: 3px;
    }

    .bar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ─── STATS ROW ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }
    .stat-card .stat-lbl {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .stat-card .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-bottom: 4px;
    }

    /* ─── TABLE ─── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .subject-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 400px;
    }

    thead tr { background: var(--surface2); }

    th {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th:last-child { text-align: right; }

    td {
      padding: 11px 16px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid rgba(37,42,56,0.6);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .subject-name { font-weight: 500; }

    .units-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 10px;
    }

    .grade-input-wrap {
      position: relative;
      width: 80px;
    }

    .grade-input-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 8px;
      width: 100%;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .grade-input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .td-action { text-align: right; }
    .td-action-inner { display: flex; gap: 6px; justify-content: flex-end; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
    }
    .empty-state .empty-icon {
      font-size: 38px;
      margin-bottom: 10px;
      opacity: 0.4;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      width: 100%;
      max-width: 420px;
      transform: translateY(20px);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-form-group { margin-bottom: 12px; }
    .modal-form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-soft);
      letter-spacing: 0.4px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: calc(100vw - 48px);
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 0;
        margin-top: 16px;
      }

      .sidebar {
        display: none;
        margin-bottom: 16px;
      }
      .sidebar.open { display: flex; }

      .sidebar-toggle {
        display: flex;
      }

      header { padding: 16px 16px 0; }
      .layout { padding: 0 14px; }

      .student-bar { padding: 14px 16px; }
      .gwa-value { font-size: 26px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 12px 12px; }
      .stat-card .stat-val { font-size: 18px; }
    }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(3,1fr); }
      .bar-right { justify-content: flex-start; width: 100%; }
      .student-bar { flex-direction: column; align-items: flex-start; }
      .gwa-display { align-items: flex-start; }
      .bar-actions .btn { font-size: 11px; padding: 4px 8px; }
      header { padding: 14px 14px 0; }
      .layout { padding: 0 12px; }
      .card { padding: 16px; }
      td, th { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">GS</div>
    <div class="header-title">
      <h1>Grading System</h1>
      <p>Capstone · GWA Tracker</p>
    </div>
  </div>
  <button class="sidebar-toggle" onclick="toggleSidebar()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Menu
  </button>
</header>

<div class="layout">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar" id="sidebar">

    <div class="card">
      <div class="card-label">Select Student</div>
      <div class="select-wrapper">
        <select id="studentSelect" onchange="selectStudent()">
          <option value="">— Choose a student —</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-label">New Student</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="studentName" placeholder="e.g. Maria Santos">
      </div>
      <div class="form-group">
        <label>Section</label>
        <input type="text" id="section" placeholder="e.g. BSCS-4A">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Course</label>
        <input type="text" id="course" placeholder="e.g. BSCS">
      </div>
      <button class="btn btn-primary" onclick="createStudent()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Create Student
      </button>
    </div>

    <div class="card">
      <div class="card-label">Add Subject</div>
      <div class="form-group">
        <label>Subject Name</label>
        <input type="text" id="subject" placeholder="e.g. Capstone 1">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Units</label>
        <input type="number" id="units" placeholder="e.g. 3" min="1" max="6">
      </div>
      <button class="btn btn-primary" onclick="addSubject()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Subject
      </button>
    </div>

  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <div class="student-bar" id="studentBar" style="display:none">
      <div class="student-info">
        <div class="avatar" id="avatarInitial">—</div>
        <div class="student-details">
          <h3 id="barName">—</h3>
          <p id="barMeta">—</p>
        </div>
      </div>
      <div class="bar-right">
        <div class="gwa-display">
          <span class="gwa-label">GWA</span>
          <span class="gwa-value" id="gwa">—</span>
          <span class="gwa-remark" id="gwaRemark"></span>
        </div>
        <div class="bar-actions">
          <button class="btn btn-warning" onclick="openEditStudent()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn btn-danger" onclick="deleteStudent()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--accent)"></div>
        <div class="stat-val" id="statSubjects">0</div>
        <div class="stat-lbl">Subjects</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--success)"></div>
        <div class="stat-val" id="statUnits">0</div>
        <div class="stat-lbl">Units</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--warning)"></div>
        <div class="stat-val" id="statGraded">0</div>
        <div class="stat-lbl">Graded</div>
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-header">
        <h3>Subject Records</h3>
        <span class="subject-count" id="subjCountBadge">0 subjects</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Subject</th>
              <th>Units</th>
              <th>Grade</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="subjectList">
            <tr>
              <td colspan="4">
                <div class="empty-state">
                  <div class="empty-icon">📋</div>
                  <p>Select a student to view their subjects</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ─── EDIT STUDENT MODAL ─── -->
<div class="modal-overlay" id="editStudentModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Student Info
    </div>
    <div class="modal-form-group">
      <label>Full Name</label>
      <input type="text" id="editName" placeholder="Full Name">
    </div>
    <div class="modal-form-group">
      <label>Section</label>
      <input type="text" id="editSection" placeholder="Section">
    </div>
    <div class="modal-form-group" style="margin-bottom:20px">
      <label>Course</label>
      <input type="text" id="editCourse" placeholder="Course">
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('editStudentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditStudent()" style="width:auto;flex:1">Save Changes</button>
    </div>
  </div>
</div>

<!-- ─── EDIT SUBJECT MODAL ─── -->
<div class="modal-overlay" id="editSubjectModal">
  <div class="modal">
    <div class="modal-title">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Subject
    </div>
    <input type="hidden" id="editSubjectId">
    <div class="modal-form-group">
      <label>Subject Name</label>
      <input type="text" id="editSubjectName" placeholder="Subject Name">
    </div>
    <div class="modal-form-group" style="margin-bottom:20px">
      <label>Units</label>
      <input type="number" id="editSubjectUnits" placeholder="Units" min="1" max="6">
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('editSubjectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditSubject()" style="width:auto;flex:1">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg">Done</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, getDocs, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKTXE50F0O72NPrW4DJB_K9Mkz54saLpY",
  authDomain: "janicalibuna555.firebaseapp.com",
  projectId: "janicalibuna555",
  storageBucket: "janicalibuna555.firebasestorage.app",
  messagingSenderId: "297095822851",
  appId: "1:297095822851:web:e608b8e03dc621d7c69836"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentStudentId = null;
let currentStudentData = null;

// ── Utils ──
function showToast(msg, icon = "✓") {
  const t = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  document.getElementById("toastIcon").textContent = icon;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

function getGradeColor(g) {
  if (!g) return "var(--text-muted)";
  if (g <= 1.5) return "var(--success)";
  if (g <= 2.5) return "var(--accent)";
  if (g <= 3.0) return "var(--warning)";
  return "var(--danger)";
}

function getRemark(gwa) {
  const g = parseFloat(gwa);
  if (!g || isNaN(g)) return { text: "", color: "", bg: "" };
  if (g <= 1.25) return { text: "Summa Cum Laude", color: "#34d399", bg: "rgba(52,211,153,0.12)" };
  if (g <= 1.50) return { text: "Magna Cum Laude", color: "#60a5fa", bg: "rgba(96,165,250,0.12)" };
  if (g <= 1.75) return { text: "Cum Laude", color: "#a78bfa", bg: "rgba(167,139,250,0.12)" };
  if (g <= 3.00) return { text: "Passing", color: "#fbbf24", bg: "rgba(251,191,36,0.12)" };
  return { text: "Below Average", color: "#f87171", bg: "rgba(248,113,113,0.12)" };
}

function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
window.closeModal = closeModal;

// Close modal on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.remove("open");
  });
});



// ── Student bar ──
function updateStudentBar(data) {
  const bar = document.getElementById("studentBar");
  const statsRow = document.getElementById("statsRow");
  if (!data) { bar.style.display = "none"; statsRow.style.display = "none"; return; }
  bar.style.display = "flex";
  statsRow.style.display = "grid";
  document.getElementById("avatarInitial").textContent = data.name ? data.name[0].toUpperCase() : "?";
  document.getElementById("barName").textContent = data.name;
  document.getElementById("barMeta").textContent = `${data.section} · ${data.course}`;
}

// ── Load students into dropdown ──
async function loadStudents() {
  const select = document.getElementById("studentSelect");
  select.innerHTML = '<option value="">— Choose a student —</option>';
  const snapshot = await getDocs(collection(db, "students"));
  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    const opt = document.createElement("option");
    opt.value = docSnap.id;
    opt.textContent = `${d.name} · ${d.section}`;
    select.appendChild(opt);
  });
}

// ── Select student ──
async function selectStudent() {
  currentStudentId = document.getElementById("studentSelect").value;
  if (!currentStudentId) {
    currentStudentData = null;
    updateStudentBar(null);
    document.getElementById("subjectList").innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📋</div><p>Select a student to view their subjects</p></div></td></tr>`;
    document.getElementById("gwa").textContent = "—";
    document.getElementById("gwaRemark").textContent = "";
    document.getElementById("subjCountBadge").textContent = "0 subjects";
    return;
  }
  const snapshot = await getDocs(collection(db, "students"));
  snapshot.forEach(d => { if (d.id === currentStudentId) currentStudentData = d.data(); });
  updateStudentBar(currentStudentData);
  loadSubjects();
}
window.selectStudent = selectStudent;

// ── Create student ──
async function createStudent() {
  const name = document.getElementById("studentName").value.trim();
  const section = document.getElementById("section").value.trim();
  const course = document.getElementById("course").value.trim();
  if (!name || !section || !course) { showToast("Please fill all fields", "⚠️"); return; }

  const studentRef = doc(collection(db, "students"));
  await setDoc(studentRef, { name, section, course, gwa: null });
  currentStudentId = studentRef.id;
  currentStudentData = { name, section, course };

  document.getElementById("studentName").value = "";
  document.getElementById("section").value = "";
  document.getElementById("course").value = "";

  await loadStudents();
  document.getElementById("studentSelect").value = currentStudentId;
  updateStudentBar(currentStudentData);
  loadSubjects();
  showToast(`Student "${name}" created!`, "🎓");

  // Close sidebar on mobile after creating
  if (window.innerWidth <= 820) {
    document.getElementById("sidebar").classList.remove("open");
  }
}
window.createStudent = createStudent;

// ── Delete student ──
window.deleteStudent = async function() {
  if (!currentStudentId || !currentStudentData) return;
  if (!confirm(`Delete "${currentStudentData.name}" and ALL their subjects? This cannot be undone.`)) return;

  // Delete all subjects first
  const subjectsSnap = await getDocs(collection(db, "students", currentStudentId, "subjects"));
  const delPromises = [];
  subjectsSnap.forEach(s => delPromises.push(deleteDoc(s.ref)));
  await Promise.all(delPromises);

  // Delete student doc
  await deleteDoc(doc(db, "students", currentStudentId));

  const deletedName = currentStudentData.name;
  currentStudentId = null;
  currentStudentData = null;

  await loadStudents();
  updateStudentBar(null);
  document.getElementById("subjectList").innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📋</div><p>Select a student to view their subjects</p></div></td></tr>`;
  document.getElementById("gwa").textContent = "—";
  document.getElementById("gwaRemark").textContent = "";
  document.getElementById("subjCountBadge").textContent = "0 subjects";
  document.getElementById("statSubjects").textContent = "0";
  document.getElementById("statUnits").textContent = "0";
  document.getElementById("statGraded").textContent = "0";
  showToast(`"${deletedName}" deleted`, "🗑️");
};

// ── Edit student modal ──
window.openEditStudent = function() {
  if (!currentStudentData) return;
  document.getElementById("editName").value = currentStudentData.name || "";
  document.getElementById("editSection").value = currentStudentData.section || "";
  document.getElementById("editCourse").value = currentStudentData.course || "";
  openModal("editStudentModal");
};

window.saveEditStudent = async function() {
  const name = document.getElementById("editName").value.trim();
  const section = document.getElementById("editSection").value.trim();
  const course = document.getElementById("editCourse").value.trim();
  if (!name || !section || !course) { showToast("Fill all fields", "⚠️"); return; }

  await setDoc(doc(db, "students", currentStudentId), { name, section, course }, { merge: true });
  currentStudentData = { ...currentStudentData, name, section, course };
  updateStudentBar(currentStudentData);
  await loadStudents();
  document.getElementById("studentSelect").value = currentStudentId;
  closeModal("editStudentModal");
  showToast("Student info updated!", "✏️");
};

// ── Add subject ──
async function addSubject() {
  if (!currentStudentId) { showToast("Select or create a student first", "⚠️"); return; }
  const subject = document.getElementById("subject").value.trim();
  const units = parseFloat(document.getElementById("units").value);
  if (!subject || !units) { showToast("Fill subject name and units", "⚠️"); return; }

  const subjectsRef = collection(db, "students", currentStudentId, "subjects");
  await addDoc(subjectsRef, { subject, units, grade: null });

  document.getElementById("subject").value = "";
  document.getElementById("units").value = "";
  loadSubjects();
  showToast(`"${subject}" added`, "📘");

  if (window.innerWidth <= 820) {
    document.getElementById("sidebar").classList.remove("open");
  }
}
window.addSubject = addSubject;

// ── Load subjects ──
async function loadSubjects() {
  const tbody = document.getElementById("subjectList");
  tbody.innerHTML = "";
  if (!currentStudentId) return;

  const subjectsRef = collection(db, "students", currentStudentId, "subjects");
  const snapshot = await getDocs(subjectsRef);

  let totalUnits = 0, totalWeighted = 0, graded = 0;
  const rows = [];

  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    if (d.grade !== null) {
      totalUnits += d.units;
      totalWeighted += d.units * d.grade;
      graded++;
    }
    rows.push({ id: docSnap.id, ...d });
  });

  document.getElementById("statSubjects").textContent = rows.length;
  document.getElementById("statUnits").textContent = rows.reduce((s, r) => s + r.units, 0);
  document.getElementById("statGraded").textContent = graded;
  document.getElementById("subjCountBadge").textContent = `${rows.length} subject${rows.length !== 1 ? "s" : ""}`;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📚</div><p>No subjects yet. Add one from the sidebar.</p></div></td></tr>`;
    document.getElementById("gwa").textContent = "—";
    document.getElementById("gwaRemark").textContent = "";
    return;
  }

  rows.forEach(data => {
    const gradeVal = data.grade !== null ? data.grade : "";
    const chipColor = data.grade ? getGradeColor(data.grade) : "var(--border)";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="subject-name">${data.subject}</span></td>
      <td><span class="units-badge">${data.units} u</span></td>
      <td>
        <div class="grade-input-wrap">
          <input type="number" min="1" max="5" step="0.25"
            value="${gradeVal}" placeholder="—"
            style="border-color:${chipColor}; color:${chipColor}"
            onchange="updateGrade('${data.id}', this.value)">
        </div>
      </td>
      <td class="td-action">
        <div class="td-action-inner">
          <button class="btn btn-warning" onclick="openEditSubject('${data.id}', '${data.subject.replace(/'/g,"\\'")}', ${data.units})">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn btn-danger" onclick="deleteSubject('${data.id}')">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            Del
          </button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  const gwa = totalUnits > 0 ? totalWeighted / totalUnits : 0;
  // 1 decimal point
  const gwaStr = totalUnits > 0 ? gwa.toFixed(1) : "—";
  document.getElementById("gwa").textContent = gwaStr;

  const remark = getRemark(gwaStr);
  const remarkEl = document.getElementById("gwaRemark");
  remarkEl.textContent = remark.text;
  remarkEl.style.background = remark.bg;
  remarkEl.style.color = remark.color;

  if (totalUnits > 0) {
    await setDoc(doc(db, "students", currentStudentId), { gwa: gwaStr }, { merge: true });
  }
}

// ── Update grade ──
window.updateGrade = async function(subjectId, value) {
  if (!currentStudentId) return;
  const grade = parseFloat(value);
  if (isNaN(grade) || grade < 1 || grade > 5) { showToast("Grade must be between 1.0 and 5.0", "⚠️"); return; }
  const subjectRef = doc(db, "students", currentStudentId, "subjects", subjectId);
  await setDoc(subjectRef, { grade }, { merge: true });
  loadSubjects();
  showToast("Grade updated", "✅");
};

// ── Delete subject ──
window.deleteSubject = async function(subjectId) {
  if (!currentStudentId) return;
  if (!confirm("Remove this subject?")) return;
  await deleteDoc(doc(db, "students", currentStudentId, "subjects", subjectId));
  loadSubjects();
  showToast("Subject removed", "🗑️");
};

// ── Edit subject modal ──
window.openEditSubject = function(id, name, units) {
  document.getElementById("editSubjectId").value = id;
  document.getElementById("editSubjectName").value = name;
  document.getElementById("editSubjectUnits").value = units;
  openModal("editSubjectModal");
};

window.saveEditSubject = async function() {
  const id = document.getElementById("editSubjectId").value;
  const name = document.getElementById("editSubjectName").value.trim();
  const units = parseFloat(document.getElementById("editSubjectUnits").value);
  if (!name || !units) { showToast("Fill all fields", "⚠️"); return; }
  const subjectRef = doc(db, "students", currentStudentId, "subjects", id);
  await setDoc(subjectRef, { subject: name, units }, { merge: true });
  closeModal("editSubjectModal");
  loadSubjects();
  showToast("Subject updated!", "✏️");
};

loadStudents();
</script>
</body>
</html>
