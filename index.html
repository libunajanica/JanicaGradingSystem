<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capstone Grading System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --accent-glow: rgba(79,142,247,0.18);
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --text: #e8ecf5;
      --text-muted: #6b7494;
      --text-soft: #9ba5c4;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 0%, rgba(79,142,247,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(124,92,252,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      padding: 28px 40px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(79,142,247,0.35);
    }

    .header-title h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ─── MAIN LAYOUT ─── */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 28px auto 40px;
      padding: 0 24px;
    }

    /* ─── SIDEBAR ─── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #303550; }

    .card-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::before {
      content: '';
      width: 16px; height: 2px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      border-radius: 2px;
    }

    /* ─── STUDENT SELECT ─── */
    .select-wrapper { position: relative; }

    select {
      width: 100%;
      appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 36px 10px 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* ─── INPUTS ─── */
    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-soft);
      letter-spacing: 0.4px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--text-muted); }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,142,247,0.25);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-danger {
      background: rgba(248,113,113,0.1);
      color: var(--danger);
      border: 1px solid rgba(248,113,113,0.2);
      padding: 5px 12px;
      font-size: 12px;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.18); }

    /* ─── MAIN CONTENT ─── */
    .main { display: flex; flex-direction: column; gap: 16px; }

    /* ─── STUDENT INFO BAR ─── */
    .student-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .student-info {
      display: flex; align-items: center; gap: 14px;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .student-details h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .student-details p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── GWA BADGE ─── */
    .gwa-display {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .gwa-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .gwa-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gwa-remark {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 99px;
      margin-top: 4px;
    }

    /* ─── SUBJECTS TABLE ─── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .subject-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
    }

    th {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 11px 18px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th:last-child { text-align: right; }

    td {
      padding: 13px 18px;
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid rgba(37,42,56,0.6);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr {
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .subject-name {
      font-weight: 500;
    }

    .units-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 10px;
    }

    .grade-input-wrap {
      position: relative;
      width: 90px;
    }

    .grade-input-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 7px 10px;
      width: 100%;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .grade-input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .td-action { text-align: right; }

    /* ─── GRADE COLOR CHIPS ─── */
    .grade-chip {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      padding: 52px 24px;
      text-align: center;
    }
    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ─── ADD SUBJECT INLINE ─── */
    .add-subject-row td {
      padding: 10px 18px !important;
      border-bottom: none !important;
      background: rgba(79,142,247,0.04);
    }

    /* ─── STATS ROW ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }
    .stat-card .stat-lbl {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .stat-card .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-bottom: 6px;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; padding: 0 14px; }
      header { padding: 18px 20px 0; }
      .stats-row { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">GS</div>
  <div class="header-title">
    <h1>Grading System</h1>
    <p>Capstone Project · GWA Tracker</p>
  </div>
</header>

<div class="layout">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">

    <div class="card">
      <div class="card-label">Select Student</div>
      <div class="select-wrapper">
        <select id="studentSelect" onchange="selectStudent()">
          <option value="">— Choose a student —</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-label">New Student</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="studentName" placeholder="e.g. Maria Santos">
      </div>
      <div class="form-group">
        <label>Section</label>
        <input type="text" id="section" placeholder="e.g. BSCS-4A">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Course</label>
        <input type="text" id="course" placeholder="e.g. BSCS">
      </div>
      <button class="btn btn-primary" onclick="createStudent()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Create Student
      </button>
    </div>

    <div class="card">
      <div class="card-label">Add Subject</div>
      <div class="form-group">
        <label>Subject Name</label>
        <input type="text" id="subject" placeholder="e.g. Capstone 1">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Units</label>
        <input type="number" id="units" placeholder="e.g. 3" min="1" max="6">
      </div>
      <button class="btn btn-primary" onclick="addSubject()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Subject
      </button>
    </div>

  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <!-- Student bar -->
    <div class="student-bar" id="studentBar" style="display:none">
      <div class="student-info">
        <div class="avatar" id="avatarInitial">—</div>
        <div class="student-details">
          <h3 id="barName">—</h3>
          <p id="barMeta">—</p>
        </div>
      </div>
      <div class="gwa-display">
        <span class="gwa-label">GWA</span>
        <span class="gwa-value" id="gwa">—</span>
        <span class="gwa-remark" id="gwaRemark"></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--accent)"></div>
        <div class="stat-val" id="statSubjects">0</div>
        <div class="stat-lbl">Subjects</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--success)"></div>
        <div class="stat-val" id="statUnits">0</div>
        <div class="stat-lbl">Total Units</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:var(--warning)"></div>
        <div class="stat-val" id="statGraded">0</div>
        <div class="stat-lbl">Graded</div>
      </div>
    </div>

    <!-- Subjects table -->
    <div class="table-wrapper">
      <div class="table-header">
        <h3>Subject Records</h3>
        <span class="subject-count" id="subjCountBadge">0 subjects</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Units</th>
            <th>Grade</th>
            <th style="text-align:right">Action</th>
          </tr>
        </thead>
        <tbody id="subjectList">
          <tr>
            <td colspan="4">
              <div class="empty-state">
                <div class="empty-icon">📋</div>
                <p>Select a student to view their subjects</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg">Done</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAKTXE50F0O72NPrW4DJB_K9Mkz54saLpY",
    authDomain: "janicalibuna555.firebaseapp.com",
    projectId: "janicalibuna555",
    storageBucket: "janicalibuna555.firebasestorage.app",
    messagingSenderId: "297095822851",
    appId: "1:297095822851:web:e608b8e03dc621d7c69836"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentStudentId = null;
let currentStudentData = null;

function showToast(msg, icon = "✓") {
  const t = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  document.getElementById("toastIcon").textContent = icon;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

function getGradeColor(g) {
  if (!g) return "var(--text-muted)";
  if (g <= 1.5) return "var(--success)";
  if (g <= 2.5) return "var(--accent)";
  if (g <= 3.0) return "var(--warning)";
  return "var(--danger)";
}

function getRemark(gwa) {
  const g = parseFloat(gwa);
  if (!g || isNaN(g)) return { text: "", color: "", bg: "" };
  if (g <= 1.25) return { text: "Summa Cum Laude", color: "#34d399", bg: "rgba(52,211,153,0.12)" };
  if (g <= 1.50) return { text: "Magna Cum Laude", color: "#60a5fa", bg: "rgba(96,165,250,0.12)" };
  if (g <= 1.75) return { text: "Cum Laude", color: "#a78bfa", bg: "rgba(167,139,250,0.12)" };
  if (g <= 3.00) return { text: "Passing", color: "#fbbf24", bg: "rgba(251,191,36,0.12)" };
  return { text: "Below Average", color: "#f87171", bg: "rgba(248,113,113,0.12)" };
}

function updateStudentBar(data) {
  const bar = document.getElementById("studentBar");
  const statsRow = document.getElementById("statsRow");
  if (!data) { bar.style.display = "none"; statsRow.style.display = "none"; return; }
  bar.style.display = "flex";
  statsRow.style.display = "grid";
  document.getElementById("avatarInitial").textContent = data.name ? data.name[0].toUpperCase() : "?";
  document.getElementById("barName").textContent = data.name;
  document.getElementById("barMeta").textContent = `${data.section} · ${data.course}`;
}

async function loadStudents() {
  const select = document.getElementById("studentSelect");
  select.innerHTML = '<option value="">— Choose a student —</option>';
  const snapshot = await getDocs(collection(db, "students"));
  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    const opt = document.createElement("option");
    opt.value = docSnap.id;
    opt.textContent = `${d.name} · ${d.section}`;
    select.appendChild(opt);
  });
}

async function selectStudent() {
  currentStudentId = document.getElementById("studentSelect").value;
  if (!currentStudentId) {
    currentStudentData = null;
    updateStudentBar(null);
    document.getElementById("subjectList").innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📋</div><p>Select a student to view their subjects</p></div></td></tr>`;
    document.getElementById("gwa").textContent = "—";
    document.getElementById("gwaRemark").textContent = "";
    document.getElementById("subjCountBadge").textContent = "0 subjects";
    return;
  }
  const snapshot = await getDocs(collection(db, "students"));
  snapshot.forEach(d => { if (d.id === currentStudentId) currentStudentData = d.data(); });
  updateStudentBar(currentStudentData);
  loadSubjects();
}

async function createStudent() {
  const name = document.getElementById("studentName").value.trim();
  const section = document.getElementById("section").value.trim();
  const course = document.getElementById("course").value.trim();
  if (!name || !section || !course) { showToast("Please fill all fields", "⚠️"); return; }

  const studentRef = doc(collection(db, "students"));
  await setDoc(studentRef, { name, section, course, gwa: null });
  currentStudentId = studentRef.id;
  currentStudentData = { name, section, course };

  document.getElementById("studentName").value = "";
  document.getElementById("section").value = "";
  document.getElementById("course").value = "";

  await loadStudents();
  document.getElementById("studentSelect").value = currentStudentId;
  updateStudentBar(currentStudentData);
  loadSubjects();
  showToast(`Student "${name}" created!`, "🎓");
}

async function addSubject() {
  if (!currentStudentId) { showToast("Select or create a student first", "⚠️"); return; }
  const subject = document.getElementById("subject").value.trim();
  const units = parseFloat(document.getElementById("units").value);
  if (!subject || !units) { showToast("Fill subject name and units", "⚠️"); return; }

  const subjectsRef = collection(db, "students", currentStudentId, "subjects");
  await addDoc(subjectsRef, { subject, units, grade: null });

  document.getElementById("subject").value = "";
  document.getElementById("units").value = "";
  loadSubjects();
  showToast(`"${subject}" added`, "📘");
}

async function loadSubjects() {
  const tbody = document.getElementById("subjectList");
  tbody.innerHTML = "";
  if (!currentStudentId) return;

  const subjectsRef = collection(db, "students", currentStudentId, "subjects");
  const snapshot = await getDocs(subjectsRef);

  let totalUnits = 0, totalWeighted = 0, graded = 0;
  const rows = [];

  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    if (d.grade !== null) {
      totalUnits += d.units;
      totalWeighted += d.units * d.grade;
      graded++;
    }
    rows.push({ id: docSnap.id, ...d });
  });

  // Update stats
  document.getElementById("statSubjects").textContent = rows.length;
  document.getElementById("statUnits").textContent = rows.reduce((s, r) => s + r.units, 0);
  document.getElementById("statGraded").textContent = graded;
  document.getElementById("subjCountBadge").textContent = `${rows.length} subject${rows.length !== 1 ? "s" : ""}`;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📚</div><p>No subjects yet. Add one from the sidebar.</p></div></td></tr>`;
    document.getElementById("gwa").textContent = "—";
    document.getElementById("gwaRemark").textContent = "";
    return;
  }

  rows.forEach(data => {
    const gradeVal = data.grade !== null ? data.grade : "";
    const chipColor = data.grade ? getGradeColor(data.grade) : "var(--border)";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="subject-name">${data.subject}</span></td>
      <td><span class="units-badge">${data.units} u</span></td>
      <td>
        <div class="grade-input-wrap">
          <input type="number" min="1" max="5" step="0.25"
            value="${gradeVal}" placeholder="—"
            style="border-color:${chipColor}; color:${chipColor}"
            onchange="updateGrade('${data.id}', this.value)">
        </div>
      </td>
      <td class="td-action">
        <button class="btn btn-danger" onclick="deleteSubject('${data.id}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Remove
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  const gwa = totalUnits > 0 ? totalWeighted / totalUnits : 0;
  const gwaStr = totalUnits > 0 ? gwa.toFixed(2) : "—";
  document.getElementById("gwa").textContent = gwaStr;

  const remark = getRemark(gwaStr);
  const remarkEl = document.getElementById("gwaRemark");
  remarkEl.textContent = remark.text;
  remarkEl.style.background = remark.bg;
  remarkEl.style.color = remark.color;

  if (totalUnits > 0) {
    const studentRef = doc(db, "students", currentStudentId);
    await setDoc(studentRef, { gwa: gwaStr }, { merge: true });
  }
}

async function updateGrade(subjectId, value) {
  if (!currentStudentId) return;
  const grade = parseFloat(value);
  if (isNaN(grade) || grade < 1 || grade > 5) { showToast("Grade must be between 1.0 and 5.0", "⚠️"); return; }
  const subjectRef = doc(db, "students", currentStudentId, "subjects", subjectId);
  await setDoc(subjectRef, { grade }, { merge: true });
  loadSubjects();
}

async function deleteSubject(subjectId) {
  if (!currentStudentId) return;
  if (!confirm("Remove this subject?")) return;
  const subjectRef = doc(db, "students", currentStudentId, "subjects", subjectId);
  await deleteDoc(subjectRef);
  loadSubjects();
  showToast("Subject removed", "🗑️");
}

// Expose globals
window.selectStudent = selectStudent;
window.createStudent = createStudent;
window.addSubject = addSubject;
window.updateGrade = updateGrade;
window.deleteSubject = deleteSubject;

loadStudents();
</script>
</body>
</html>
